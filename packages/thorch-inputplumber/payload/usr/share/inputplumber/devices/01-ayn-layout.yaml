# yaml-language-server: $schema=https://raw.githubusercontent.com/ShadowBlip/InputPlumber/main/rootfs/usr/share/inputplumber/schema/composite_device_v1.json
version: 1
kind: CompositeDevice
name: AYN Layout
matches:
  - udev:
      sys_path: /sys/firmware/devicetree/base
      attributes:
        - name: model
          value: AYN Odin 2
  - udev:
      sys_path: /sys/firmware/devicetree/base
      attributes:
        - name: model
          value: AYN Odin 2 Mini
  - udev:
      sys_path: /sys/firmware/devicetree/base
      attributes:
        - name: model
          value: AYN Odin 2 Portal
  - udev:
      sys_path: /sys/firmware/devicetree/base
      attributes:
        - name: model
          value: AYN Thor
  - udev:
      sys_path: /sys/firmware/devicetree/base
      attributes:
        - name: model
          value: Retroid Pocket 6
  - udev:
      sys_path: /sys/firmware/devicetree/base
      attributes:
        - name: model
          value: Retroid Pocket 6 TOP-DPAD

single_source: false
source_devices:
  - group: gamepad
    evdev:
      phys_path: rsinput-gamepad/input0
      handler: event*
    capability_map_id: ayn_mcu

options:
  auto_manage: true

target_devices:
  - xbox-series
  - mouse
  - keyboard
